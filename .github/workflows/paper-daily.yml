name: Paper Daily Producer

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "UTC content date to process, for example 2026-05-07. Leave empty for yesterday."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: paper-daily-producer-${{ github.ref }}
  cancel-in-progress: false

jobs:
  produce:
    name: Produce paper feed
    runs-on: ubuntu-latest
    env:
      DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
      RUN_DATE: ${{ inputs.date || '' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Verify required secret
        run: |
          if [ -z "$DASHSCOPE_API_KEY" ]; then
            echo "DASHSCOPE_API_KEY secret is not configured." >&2
            exit 1
          fi

      - name: Run producer
        run: |
          set -euo pipefail
          args=()
          if [ -n "$RUN_DATE" ]; then
            args+=(--date "$RUN_DATE")
          fi
          python3 skill/paper-daily/scripts/run_daily.py \
            --repo-root . \
            "${args[@]}" \
            --select 5 \
            --min-select 3 \
            --max-results-per-keyword 20 \
            --delay-seconds 3.1 \
            --timeout-seconds 60 \
            --retries 2 \
            --backfill-days 7 \
            --public-base-url "https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}" \
            --source-repo "${{ github.repository }}"

      - name: Commit produced artifacts
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md README_en.md feed-papers.json data/canonical-papers.json skill/paper-daily/output/*.json summary summary_en
          if git diff --cached --quiet; then
            echo "No paper-daily changes to commit."
            exit 0
          fi
          git commit -m "chore: update daily papers"
          git push
